execution_profiles:
  automatic_internal:
    human_gate_categories: []
    automatic_completion: true
    default_quarantine: fail_closed_and_continue_other_lanes
  product_scope:
    human_gate_categories: [product_scope]
    automatic_completion: false
    default_quarantine: retain_narrow_scope
  rights_spend:
    human_gate_categories: [spending, people_contact, contract_consent, rights_legal_privacy]
    automatic_completion: false
    default_quarantine: block_external_use_and_continue_internal_work
  method_before_people:
    human_gate_categories: [confirmatory_method_freeze]
    automatic_completion: false
    default_quarantine: exploratory_only
  human_study:
    human_gate_categories: [spending, people_contact, contract_consent, unblinding]
    automatic_completion: false
    default_quarantine: stop_collection_and_quarantine_affected_records
  distribution_decision:
    human_gate_categories: [license_legal, distribution_posture]
    automatic_completion: false
    default_quarantine: internal_source_run_only
  production_promotion:
    human_gate_categories: [material_audio_promotion, production_change]
    automatic_completion: false
    default_quarantine: preserve_current_champion
  public_release:
    human_gate_categories: [public_claims, license_legal, signing_distribution, production_release]
    automatic_completion: false
    default_quarantine: hold_or_revoke_release
  strategic_scope:
    human_gate_categories: [product_scope, rights_legal_privacy, spending]
    automatic_completion: false
    default_quarantine: retain_released_scope
lanes:
  evidence:
    max_active: 1
    default_resource_class: low
